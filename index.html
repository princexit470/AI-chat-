<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Companion Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        html, body { background-color: #d1d7db; width: 100%; height: 100%; overflow: hidden; position: fixed; top: 0; left: 0; }

        /* Loading Screen */
        #loadingScreen { position: fixed; width: 100vw; height: 100vh; background: white; z-index: 3000; display: flex; justify-content: center; align-items: center; font-size: 20px; color: #00a884; font-weight: bold; }

        /* Auth Screen */
        #authScreen { display: none; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100;}
        #authScreen h2 { margin-bottom: 20px; color: #333; font-weight: normal; }
        .input-group { margin-bottom: 15px; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 15px; outline: none; }
        .auth-btns { display: flex; gap: 10px; margin-top: 10px; }
        .auth-btns button { flex: 1; padding: 12px; border: none; border-radius: 4px; cursor: pointer; color: white; font-size: 15px; font-weight: 500; transition: background 0.2s; }
        #loginBtn { background-color: #00a884; }
        #signupBtn { background-color: #34b7f1; }
        .auth-btns button:disabled { background-color: #8696a0; cursor: not-allowed; }
        #authError { color: #d32f2f; margin-top: 15px; font-size: 14px; min-height: 20px; }

        /* App Screen */
        #appScreen { display: none; width: 100%; height: 100%; background-color: #fff; position: relative; }
        .app-container { display: flex; width: 100%; height: 100%; position: relative; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 30%; min-width: 300px; border-right: 1px solid #e9edef; background: #fff; display: flex; flex-direction: column; height: 100%; }
        .sidebar-header { background: #f0f2f5; padding: 10px 16px; height: 60px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e9edef; position: relative; }
        .hamburger { font-size: 24px; cursor: pointer; color: #54656f; user-select: none; padding: 5px; }
        
        .dropdown { display: none; position: absolute; top: 55px; left: 16px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); border-radius: 3px; z-index: 1000; min-width: 180px; flex-direction: column; padding: 10px 0; }
        .dropdown.right { left: auto; right: 16px; }
        .dropdown div { padding: 12px 24px; cursor: pointer; color: #3b4a54; font-size: 14.5px; }
        .dropdown div:hover { background: #f5f6f6; }

        .contact-list { overflow-y: auto; flex: 1; background: #fff; }
        .contact { display: flex; align-items: center; padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #f2f2f2; position: relative; }
        .contact:hover, .contact.active { background-color: #f0f2f5; }
        .contact .avatar { font-size: 35px; margin-right: 15px; display: flex; justify-content: center; align-items: center; width: 45px; height: 45px; background: #dfe5e7; border-radius: 50%; }
        .contact-info { flex: 1; overflow: hidden; }
        .contact-info strong { display: block; color: #111b21; font-weight: normal; font-size: 16px; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .contact-info span { color: #667781; font-size: 13px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* Unread Badge */
        .unread-badge { background-color: #00a884; color: white; font-size: 12px; font-weight: bold; padding: 2px 7px; border-radius: 10px; position: absolute; right: 16px; top: 50%; transform: translateY(-50%); }

        /* Chat Area */
        .chat-area { flex: 1; display: flex; flex-direction: column; background-color: #efeae2; position: relative; height: 100%; }
        .chat-header { background: #f0f2f5; padding: 10px 16px; height: 60px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e9edef; z-index: 10;}
        
        .chat-header-info { display: flex; align-items: center; cursor: pointer; padding: 5px; border-radius: 5px; flex: 1; }
        .chat-header-info:active { background: #d1d7db; }
        
        .back-btn { display: none; font-size: 22px; cursor: pointer; color: #54656f; margin-right: 12px; font-weight: bold; padding: 5px; }
        .chat-header-info .avatar { font-size: 30px; margin-right: 12px; display: flex; justify-content: center; align-items: center; width: 40px; height: 40px; background: #dfe5e7; border-radius: 50%; }
        .chat-header-info h2 { font-size: 16px; font-weight: normal; color: #111b21; }
        .chat-options-btn { font-size: 24px; cursor: pointer; color: #54656f; padding: 0 5px; font-weight: bold; }

        .chat-box { flex: 1; padding: 20px 5%; overflow-y: auto; display: flex; flex-direction: column; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-repeat: repeat; }
        .message { max-width: 75%; padding: 8px 12px; border-radius: 7.5px; margin-bottom: 12px; font-size: 15px; line-height: 19px; box-shadow: 0 1px 0.5px rgba(11,20,26,.13); word-wrap: break-word; }
        .message.user { align-self: flex-end; background-color: #d9fdd3; border-top-right-radius: 0; }
        .message.ai { align-self: flex-start; background-color: #ffffff; border-top-left-radius: 0; }

        .chat-input-area { background: #f0f2f5; padding: 10px 12px; display: flex; align-items: center; gap: 8px; min-height: 60px; }
        #messageInput { flex: 1; padding: 12px 15px; border: none; border-radius: 8px; outline: none; font-size: 15px; background: #ffffff; }
        #sendBtn { background-color: transparent; color: #00a884; border: none; cursor: pointer; font-size: 15px; font-weight: 600; padding: 10px; }
        #sendBtn:disabled { color: #8696a0; cursor: not-allowed; }

        /* Modals */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(255,255,255,0.85); z-index: 2000; justify-content: center; align-items: center; }
        .modal { background: white; width: 90%; max-width: 400px; border-radius: 3px; box-shadow: 0 17px 50px 0 rgba(11,20,26,.19); padding: 22px; display: flex; flex-direction: column; gap: 15px; max-height: 90vh; overflow-y: auto; }
        .modal h3 { font-weight: normal; margin-bottom: 5px; color: #111b21; font-size: 18px; }
        .modal input, .modal textarea, .modal select { width: 100%; padding: 8px 0; border: none; border-bottom: 2px solid #00a884; outline: none; font-size: 15px; background: transparent; color: #111b21; }
        .modal input::placeholder, .modal textarea::placeholder { color: #8696a0; }
        .modal textarea { resize: none; height: 60px; margin-top: 10px; }
        .modal label { font-size: 13px; color: #54656f; margin-top: 10px; }
        .modal-btns { display: flex; justify-content: flex-end; gap: 20px; margin-top: 20px; }
        .modal-btns button { padding: 10px; cursor: pointer; border: none; background: transparent; font-size: 14px; font-weight: 500; text-transform: uppercase; }
        .btn-cancel { color: #54656f; }
        .btn-save { color: #00a884; }

        @media (max-width: 768px) {
            .sidebar { width: 100%; min-width: 100%; border: none; }
            .chat-area { display: none; width: 100%; position: absolute; top: 0; left: 0; height: 100%; z-index: 100; }
            .back-btn { display: block; }
            .message { max-width: 85%; }
        }
    </style>
</head>
<body>

    <div id="loadingScreen">Loading your App...</div>

    <div id="authScreen">
        <h2>App Login</h2>
        <div class="input-group"><input type="text" id="usernameInput" placeholder="Username"></div>
        <div class="input-group"><input type="password" id="passwordInput" placeholder="Password (min 6 chars)"></div>
        <div class="auth-btns">
            <button id="loginBtn">Login</button>
            <button id="signupBtn">Sign Up</button>
        </div>
        <p id="authError"></p>
    </div>

    <div id="appScreen">
        <div class="app-container">
            
            <div class="sidebar" id="sidebarArea">
                <div class="sidebar-header">
                    <div class="hamburger" id="mainMenuBtn">☰</div>
                    <div class="dropdown" id="mainMenuDropdown">
                        <div id="menuAddChar">Add New Person</div>
                        <div id="menuSettings">Settings</div>
                        <div id="menuLogout">Logout</div>
                    </div>
                </div>
                <div class="contact-list" id="contactList"></div>
            </div>

            <div class="chat-area" id="chatScreenArea">
                <div class="chat-header">
                    <div class="back-btn" id="backToListBtn">←</div>
                    <div class="chat-header-info" id="chatHeaderInfo" title="Click to edit info">
                        <div class="avatar" id="currentAvatar"></div>
                        <h2 id="currentChatName">Select a chat</h2>
                    </div>
                    <div class="chat-options-btn" id="chatOptionsBtn">⋮</div>
                    <div class="dropdown right" id="chatOptionsDropdown">
                        <div id="optClear">Clear Chat</div>
                        <div id="optBlock">Block/Unblock</div>
                        <div id="optDelete">Delete Character</div>
                    </div>
                </div>
                
                <div class="chat-box" id="chatBox"></div>

                <div class="chat-input-area">
                    <input type="text" id="messageInput" placeholder="Type a message" disabled>
                    <button id="sendBtn" disabled>SEND</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="charModalOverlay">
        <div class="modal">
            <h3 id="charModalTitle">Character Details</h3>
            <input type="text" id="charName" placeholder="Name (e.g. Priya)">
            <input type="text" id="charAvatar" placeholder="Avatar Emoji (e.g. 👩)">
            <input type="text" id="charRole" placeholder="Role (e.g. Girlfriend, Friend)">
            <textarea id="charNature" placeholder="Nature (e.g. Caring, talks sweet)"></textarea>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeModals()">Cancel</button>
                <button class="btn-save" id="saveCharBtn">Save</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="settingsModalOverlay">
        <div class="modal">
            <h3>Settings</h3>
            <label>App Interface Language</label>
            <select id="appLangSelect"><option value="en">English</option></select>
            <label>AI Chat Language & Font Style</label>
            <select id="aiLangSelect">
                <option value="Hinglish">Hindi (Written in English / Hinglish)</option>
                <option value="English">English</option>
                <option value="Hindi">Pure Hindi (Devanagari Font)</option>
            </select>
            <label>Auto Timer Messages</label>
            <select id="timerSelect">
                <option value="on">On (Morning/Night Greetings)</option>
                <option value="off">Off</option>
            </select>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeModals()">Close</button>
                <button class="btn-save" id="saveSettingsBtn">Save</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, get, child, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEFMQswwZ38RAD3F9qK9L9XtWdgmNSZ4E",
            authDomain: "notes-69142.firebaseapp.com",
            databaseURL: "https://notes-69142-default-rtdb.firebaseio.com",
            projectId: "notes-69142",
            storageBucket: "notes-69142.firebasestorage.app",
            messagingSenderId: "242815696119",
            appId: "1:242815696119:web:559f7bee4133a4d1e4a7f2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const AI_API_KEY = "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";

        let currentUserUid = null;
        let myContacts = {}; 
        let currentContactId = null;
        let settings = { aiLang: "Hinglish", timers: "on" };

        // Push Notification Permission
        if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") {
            Notification.requestPermission();
        }

        function sendSystemNotification(title, body) {
            if ("Notification" in window && Notification.permission === "granted") {
                new Notification(title, { body: body, icon: "https://cdn-icons-png.flaticon.com/512/893/893257.png" });
            }
        }

        // Modals & Menus
        window.closeModals = () => document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');
        document.getElementById("mainMenuBtn").onclick = (e) => { e.stopPropagation(); toggleMenu('mainMenuDropdown'); };
        document.getElementById("chatOptionsBtn").onclick = (e) => { e.stopPropagation(); toggleMenu('chatOptionsDropdown'); };
        document.body.onclick = () => document.querySelectorAll('.dropdown').forEach(d => d.style.display = 'none');

        function toggleMenu(id) {
            document.querySelectorAll('.dropdown').forEach(d => { if(d.id !== id) d.style.display = 'none'; });
            const menu = document.getElementById(id);
            menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
        }

        // --- HARDWARE BACK BUTTON FIX ---
        function closeChatToMobileList() {
            document.getElementById('chatScreenArea').style.display = 'none';
            document.getElementById('sidebarArea').style.display = 'flex';
            currentContactId = null;
            renderContacts(); 
        }

        document.getElementById('backToListBtn').onclick = () => {
            history.back(); // Triggers popstate
        };

        window.addEventListener('popstate', (event) => {
            if (currentContactId && window.innerWidth <= 768) {
                closeChatToMobileList();
            }
        });

        window.addEventListener('resize', () => {
            if(window.innerWidth > 768) {
                document.getElementById('sidebarArea').style.display = 'flex';
                document.getElementById('chatScreenArea').style.display = 'flex';
            } else {
                if(currentContactId) {
                    document.getElementById('sidebarArea').style.display = 'none';
                    document.getElementById('chatScreenArea').style.display = 'flex';
                } else {
                    document.getElementById('sidebarArea').style.display = 'flex';
                    document.getElementById('chatScreenArea').style.display = 'none';
                }
            }
        });

        // --- AUTHENTICATION (FAST & SAFE) ---
        const authError = document.getElementById("authError");
        const loginBtn = document.getElementById("loginBtn");
        const signupBtn = document.getElementById("signupBtn");

        function setAuthLoading(isLoading) {
            loginBtn.disabled = isLoading;
            signupBtn.disabled = isLoading;
            loginBtn.innerText = isLoading ? "Checking..." : "Login";
            signupBtn.innerText = isLoading ? "Wait..." : "Sign Up";
        }

        document.getElementById("signupBtn").onclick = async () => {
            const user = document.getElementById("usernameInput").value.trim().toLowerCase();
            const pass = document.getElementById("passwordInput").value.trim();
            if(!user || pass.length < 6) return authError.innerText = "Valid username & password (min 6) required.";
            
            setAuthLoading(true);
            authError.innerText = "";

            try {
                const snap = await get(child(ref(db), `usernames/${user}`));
                if (snap.exists()) {
                    setAuthLoading(false);
                    return authError.innerText = "Username taken. Choose another.";
                }
                const cred = await createUserWithEmailAndPassword(auth, `${user}@princeapp.com`, pass);
                await set(ref(db, `usernames/${user}`), { uid: cred.user.uid });
                authError.style.color = "green";
                authError.innerText = "Account Created! You are being logged in.";
            } catch (e) { 
                authError.style.color = "#d32f2f";
                authError.innerText = e.message; 
                setAuthLoading(false);
            }
        };

        document.getElementById("loginBtn").onclick = async () => {
            const user = document.getElementById("usernameInput").value.trim().toLowerCase();
            const pass = document.getElementById("passwordInput").value.trim();
            if(!user || !pass) return authError.innerText = "Enter username and password.";
            
            setAuthLoading(true);
            authError.innerText = "";
            
            try { 
                await signInWithEmailAndPassword(auth, `${user}@princeapp.com`, pass); 
                // Auto-redirect will be handled by onAuthStateChanged
            } catch (e) { 
                authError.innerText = "Wrong Username or Password!"; 
                setAuthLoading(false);
            }
        };

        document.getElementById("menuLogout").onclick = () => signOut(auth);

        // --- AUTO-LOGIN HANDLER ---
        onAuthStateChanged(auth, async (user) => {
            document.getElementById("loadingScreen").style.display = "none";
            
            if (user) {
                currentUserUid = user.uid;
                document.getElementById("authScreen").style.display = "none";
                document.getElementById("appScreen").style.display = "block";
                
                if(window.innerWidth <= 768) document.getElementById('chatScreenArea').style.display = 'none';
                
                setAuthLoading(false); // Reset buttons for next time
                await loadUserData();
                if(settings.timers === "on") checkTimeTriggers(); 
            } else {
                currentUserUid = null;
                document.getElementById("appScreen").style.display = "none";
                document.getElementById("authScreen").style.display = "block"; 
                setAuthLoading(false);
            }
        });

        async function loadUserData() {
            const snap = await get(child(ref(db), `users/${currentUserUid}`));
            if (snap.exists()) {
                const data = snap.val();
                myContacts = data.contacts || {};
                settings = data.settings || { aiLang: "Hinglish", timers: "on" };
                
                Object.values(myContacts).forEach(char => {
                    if(char.unread === undefined) char.unread = 0;
                });
                renderContacts();
            }
        }
        
        async function saveContactsToDB() { if(currentUserUid) await set(ref(db, `users/${currentUserUid}/contacts`), myContacts); }

        function renderContacts() {
            const list = document.getElementById("contactList");
            list.innerHTML = "";
            Object.values(myContacts).forEach(char => {
                const div = document.createElement("div");
                div.className = `contact ${char.id === currentContactId ? 'active' : ''}`;
                const blockTag = char.isBlocked ? "<span style='color:#d32f2f;'>(Blocked)</span>" : "";
                
                // Unread Badge Logic
                const badgeTag = (char.unread && char.unread > 0) ? `<span class="unread-badge">${char.unread}</span>` : "";
                
                div.innerHTML = `<div class="avatar">${char.avatar}</div> 
                                 <div class="contact-info">
                                    <strong>${char.name}</strong>
                                    <span>${char.role} ${blockTag}</span>
                                 </div>
                                 ${badgeTag}`;
                                 
                div.onclick = () => openChat(char.id);
                list.appendChild(div);
            });
        }

        function openChat(id) {
            currentContactId = id;
            const char = myContacts[id];
            
            if(window.innerWidth <= 768) {
                history.pushState({chatOpen: true}, "");
                document.getElementById('sidebarArea').style.display = 'none';
                document.getElementById('chatScreenArea').style.display = 'flex';
            }
            
            char.unread = 0; 
            saveContactsToDB();
            renderContacts(); 
            
            document.getElementById("currentChatName").innerText = char.name;
            document.getElementById("currentAvatar").innerText = char.avatar;
            document.getElementById("messageInput").disabled = char.isBlocked;
            document.getElementById("sendBtn").disabled = char.isBlocked;
            document.getElementById("messageInput").placeholder = char.isBlocked ? "You blocked this contact." : "Type a message";
            if(!char.isBlocked) document.getElementById("messageInput").focus();

            renderChatHistory();
        }

        function renderChatHistory() {
            const box = document.getElementById("chatBox");
            box.innerHTML = "";
            if(!myContacts[currentContactId]) return;
            const history = myContacts[currentContactId].history || [];
            
            history.forEach(msg => {
                if (msg.role !== "system") {
                    const div = document.createElement("div");
                    div.className = `message ${msg.role === 'user' ? 'user' : 'ai'}`;
                    div.innerText = msg.content.replace(/\*/g, '');
                    box.appendChild(div);
                }
            });
            box.scrollTop = box.scrollHeight;
        }

        function getSystemPrompt(char) {
            let langInstruction = "Write casually in Hinglish (Hindi written in English alphabet). Use slangs like 'haan', 'acha', 'kya kar raha hai'.";
            if(settings.aiLang === "English") langInstruction = "Write in casual, short daily English. Talk like a teenager texting.";
            if(settings.aiLang === "Hindi") langInstruction = "Write in simple everyday Hindi using Devanagari script.";

            return `You are ${char.name}, the user's ${char.role}. Your nature is: ${char.nature}. 
            CRITICAL RULES TO ACT LIKE A REAL HUMAN TEXTING ON WHATSAPP:
            1. Keep replies EXTREMELY SHORT. Maximum 1 sentence. Maximum 5 to 15 words.
            2. NEVER use markdown. NEVER use **bold** or *italics*.
            3. Reply exactly like a normal human sends a quick text message.
            4. ${langInstruction}`;
        }

        async function sendMessage(textOverride = null) {
            const input = document.getElementById("messageInput");
            const text = textOverride || input.value.trim();
            if (!text || !currentContactId || myContacts[currentContactId].isBlocked) return;

            const char = myContacts[currentContactId];
            if (!char.history) char.history = [];
            
            if (char.history.length === 0 || char.history[0].role !== "system") {
                char.history.unshift({ role: "system", content: getSystemPrompt(char) });
            } else {
                char.history[0].content = getSystemPrompt(char); 
            }

            char.history.push({ role: "user", content: text });
            if(!textOverride) input.value = "";
            renderChatHistory();
            saveContactsToDB(); 

            const box = document.getElementById("chatBox");
            const loadDiv = document.createElement("div");
            loadDiv.className = "message ai";
            loadDiv.innerText = "typing...";
            loadDiv.id = "loadingMsg";
            box.appendChild(loadDiv);
            box.scrollTop = box.scrollHeight;

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${AI_API_KEY}`, "Content-Type": "application/json", "HTTP-Referer": "http://localhost", "X-Title": "Companion" },
                    body: JSON.stringify({ model: "openrouter/free", messages: char.history })
                });
                const data = await response.json();
                document.getElementById("loadingMsg")?.remove();
                
                if(data.choices && data.choices[0]) {
                    let aiReply = data.choices[0].message.content.replace(/\*/g, '');
                    char.history.push({ role: "assistant", content: aiReply });
                    
                    if(document.hidden || currentContactId !== char.id) {
                        char.unread = (char.unread || 0) + 1;
                        sendSystemNotification(`New message from ${char.name}`, aiReply);
                    }
                    
                    renderChatHistory();
                    saveContactsToDB();
                }
            } catch (error) { document.getElementById("loadingMsg")?.remove(); }
        }

        document.getElementById("sendBtn").onclick = () => sendMessage();
        document.getElementById("messageInput").onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

        function checkTimeTriggers() {
            const hour = new Date().getHours();
            let triggerText = "";
            if (hour >= 6 && hour < 10) triggerText = "Good morning! ☀️ Kaise ho aaj?";
            else if (hour >= 13 && hour < 15) triggerText = "Lunch kar liya?";
            else if (hour >= 22 || hour < 2) triggerText = "Good night, so jao ab. 🌙";

            if(triggerText) {
                let hasUpdates = false;
                Object.values(myContacts).forEach(char => {
                    if(!char.isBlocked && char.history) {
                        const lastMsg = char.history[char.history.length-1];
                        if(lastMsg && lastMsg.role !== "assistant" && lastMsg.role !== "system") {
                            char.history.push({role: "assistant", content: triggerText});
                            hasUpdates = true;
                            
                            char.unread = (char.unread || 0) + 1;
                            sendSystemNotification(char.name, triggerText);
                        }
                    }
                });
                if(hasUpdates){
                    saveContactsToDB();
                    renderContacts();
                    if(currentContactId) renderChatHistory();
                }
            }
        }

        // --- CHARACTER EDITING (CLICK ON HEADER) ---
        let editingCharId = null;

        function openEditModal(id) {
            editingCharId = id;
            const char = myContacts[id];
            document.getElementById("charModalTitle").innerText = "Change Info";
            document.getElementById("charName").value = char.name;
            document.getElementById("charAvatar").value = char.avatar;
            document.getElementById("charRole").value = char.role;
            document.getElementById("charNature").value = char.nature;
            document.getElementById("charModalOverlay").style.display = "flex";
        }

        document.getElementById("menuAddChar").onclick = () => {
            editingCharId = null;
            document.getElementById("charModalTitle").innerText = "Add New Person";
            document.getElementById("charName").value = "";
            document.getElementById("charAvatar").value = "";
            document.getElementById("charRole").value = "";
            document.getElementById("charNature").value = "";
            document.getElementById("charModalOverlay").style.display = "flex";
        };

        document.getElementById("chatHeaderInfo").onclick = () => {
            if(currentContactId) openEditModal(currentContactId);
        };

        document.getElementById("saveCharBtn").onclick = () => {
            const name = document.getElementById("charName").value.trim();
            const avatar = document.getElementById("charAvatar").value.trim() || '👤';
            const role = document.getElementById("charRole").value.trim();
            const nature = document.getElementById("charNature").value.trim();
            if(!name || !role) return alert("Name and Role required.");

            const id = editingCharId || 'char_' + Date.now();
            if(!editingCharId) {
                myContacts[id] = { id, name, avatar, role, nature, isBlocked: false, history: [], unread: 0 };
            } else {
                myContacts[id].name = name; myContacts[id].avatar = avatar; myContacts[id].role = role; myContacts[id].nature = nature;
                if (myContacts[id].history.length > 0) myContacts[id].history[0].content = getSystemPrompt(myContacts[id]);
            }
            saveContactsToDB(); renderContacts(); closeModals();
            if(currentContactId === id) openChat(id);
        };

        document.getElementById("optClear").onclick = () => {
            if(!currentContactId || !confirm("Clear all messages?")) return;
            myContacts[currentContactId].history = [];
            saveContactsToDB(); renderChatHistory();
        };

        document.getElementById("optBlock").onclick = () => {
            if(!currentContactId) return;
            myContacts[currentContactId].isBlocked = !myContacts[currentContactId].isBlocked;
            saveContactsToDB(); openChat(currentContactId);
        };

        document.getElementById("optDelete").onclick = () => {
            if(!currentContactId || !confirm("Delete this chat?")) return;
            delete myContacts[currentContactId];
            
            if(window.innerWidth <= 768) {
                history.back(); 
            } else {
                currentContactId = null;
                renderContacts();
                document.getElementById("chatBox").innerHTML = "";
                document.getElementById("currentChatName").innerText = "Select a chat";
                document.getElementById("currentAvatar").innerText = "";
                document.getElementById("messageInput").disabled = true;
                document.getElementById("sendBtn").disabled = true;
            }
            saveContactsToDB();
        };

        document.getElementById("menuSettings").onclick = () => {
            document.getElementById("aiLangSelect").value = settings.aiLang;
            document.getElementById("timerSelect").value = settings.timers;
            document.getElementById("settingsModalOverlay").style.display = "flex";
        };

        document.getElementById("saveSettingsBtn").onclick = async () => {
            settings.aiLang = document.getElementById("aiLangSelect").value;
            settings.timers = document.getElementById("timerSelect").value;
            if(currentUserUid) await update(ref(db, `users/${currentUserUid}/settings`), settings);
            
            Object.values(myContacts).forEach(char => {
                if (char.history && char.history.length > 0 && char.history[0].role === "system") {
                    char.history[0].content = getSystemPrompt(char);
                }
            });
            saveContactsToDB(); closeModals();
        };
    </script>
</body>
</html>
